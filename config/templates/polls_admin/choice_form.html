{% extends "polls_admin/base.html" %}

{% block title %}{{ page_title }} | ULK Polling Portal{% endblock %}

{% block content %}
<section class="portal-card card mx-auto" style="max-width: 760px;">
    <div class="card-body p-4">
        <p class="section-tag mb-1"><i class="bi bi-list-ul me-1"></i>{{ page_title }}</p>
        <h1 class="h4 mb-2">{{ poll.title }}</h1>
        <p class="text-secondary small-copy mb-4">Enter a clear option that voters can understand quickly.</p>

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label fw-semibold" for="text">Choice Text</label>
                <input class="form-control" type="text" id="text" name="text" value="{{ choice_value|default:'' }}" required>
            </div>
            <div class="d-flex gap-3">
                <button class="btn btn-ulk btn-sm" type="submit"><i class="bi bi-check2-circle me-1"></i>Save Choice</button>
                <a class="btn btn-outline-secondary btn-sm" href="{% url 'polls:admin-poll-detail' poll.pk %}"><i class="bi bi-x-circle me-1"></i>Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
