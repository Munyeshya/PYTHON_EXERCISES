<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ULK Polling Portal{% endblock %}</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css">
    <style>
        :root {
            --ulk-green: #0f6b3c;
            --ulk-gold: #f4c542;
            --ulk-blue: #0b2239;
        }

        body {
            background:
                linear-gradient(rgba(11, 34, 57, 0.88), rgba(11, 34, 57, 0.8)),
                url("https://ulk.ac.rw/wp-content/uploads/2012/05/May-Intake-2026-scaled.jpg") center/cover fixed;
            min-height: 100vh;
            color: #162132;
        }

        .portal-shell {
            min-height: 100vh;
            background: rgba(248, 250, 252, 0.95);
            backdrop-filter: blur(8px);
        }

        .portal-nav {
            background: linear-gradient(135deg, var(--ulk-green), #116b61, var(--ulk-blue));
            box-shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
        }

        .portal-card {
            border: 0;
            border-radius: 1.4rem;
            box-shadow: 0 1rem 2.2rem rgba(15, 23, 42, 0.1);
        }

        .hero-strip {
            background:
                linear-gradient(135deg, rgba(15, 107, 60, 0.96), rgba(11, 34, 57, 0.94)),
                url("https://ulk.ac.rw/wp-content/uploads/2026/03/WhatsApp-Image-2026-03-07-at-16.22.23-550x400.jpeg") center/cover;
            color: white;
        }

        .btn-ulk {
            background: var(--ulk-gold);
            border-color: var(--ulk-gold);
            color: #132031;
            font-weight: 700;
        }

        .btn-ulk:hover {
            background: #ddb12e;
            border-color: #ddb12e;
            color: #132031;
        }

        .section-tag {
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--ulk-green);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="portal-shell">
        <nav class="navbar navbar-expand-lg portal-nav">
            <div class="container py-2">
                <a class="navbar-brand d-flex align-items-center gap-3 text-white" href="{% url 'polls:admin-dashboard' %}">
                    <img src="https://ulk.ac.rw/wp-content/uploads/2016/06/imageedit_1_4457785095.png" alt="ULK logo" style="width: 62px;">
                    <div>
                        <div class="fw-bold">ULK Polling Portal</div>
                        <small class="opacity-75">Custom admin interface</small>
                    </div>
                </a>
                <div class="ms-auto d-flex gap-2">
                    <a class="btn btn-outline-light" href="{% url 'polls:poll-list' %}">Public Site</a>
                    {% if request.user.is_authenticated %}
                        <a class="btn btn-ulk" href="{% url 'polls:admin-logout' %}">Logout</a>
                    {% endif %}
                </div>
            </div>
        </nav>

        <main class="container py-5">
            {% if messages %}
                <div class="mb-4">
                    {% for message in messages %}
                        <div class="alert alert-{{ message.tags|default:'info' }} shadow-sm">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
