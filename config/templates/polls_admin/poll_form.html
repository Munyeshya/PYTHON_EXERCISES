{% extends "polls_admin/base.html" %}

{% block title %}{{ page_title }} | ULK Polling Portal{% endblock %}

{% block content %}
<section class="portal-card card mx-auto" style="max-width: 960px;">
    <div class="card-body p-4 p-lg-5">
        <p class="section-tag mb-1">{{ page_title }}</p>
        <h1 class="h2 mb-4">{% if poll %}Update poll details{% else %}Create a new poll{% endif %}</h1>

        <form method="post">
            {% csrf_token %}
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label fw-semibold" for="title">Title</label>
                    <input class="form-control" type="text" id="title" name="title" value="{{ form_data.title|default:'' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold" for="cover_image">Cover Image URL</label>
                    <input class="form-control" type="url" id="cover_image" name="cover_image" value="{{ form_data.cover_image|default:'' }}">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold" for="description">Description</label>
                    <textarea class="form-control" id="description" name="description" rows="5" required>{{ form_data.description|default:'' }}</textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold" for="start_date">Start Date</label>
                    <input class="form-control" type="datetime-local" id="start_date" name="start_date" value="{{ form_data.start_date|default:'' }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold" for="end_date">End Date</label>
                    <input class="form-control" type="datetime-local" id="end_date" name="end_date" value="{{ form_data.end_date|default:'' }}" required>
                </div>
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="is_published" name="is_published" {% if form_data.is_published %}checked{% endif %}>
                        <label class="form-check-label" for="is_published">Published and visible to students</label>
                    </div>
                </div>
            </div>
            <div class="d-flex gap-3 mt-4">
                <button class="btn btn-ulk" type="submit">Save Poll</button>
                <a class="btn btn-outline-secondary" href="{% url 'polls:admin-dashboard' %}">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
